name: ohif/deploy-v3-upstream-with-add-ons-us

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

jobs:
  link_build_and_deploy:
    runs-on: ubuntu-latest

    container:
      image: node:20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
      
      - name: Clone OHIF Viewers Core
        run: |
          git clone https://github.com/OHIF/Viewers.git
          cd Viewers
          git checkout "${{ vars.OHIF_VERSION_TAG }}"

      - name: Clone external GCP plugins
        run: |
          git clone https://github.com/ImagingDataCommons/ohif-gcp-mode.git
          git clone https://github.com/ImagingDataCommons/ohif-gcp-extension.git

      - name: Link plugins and build application
        run: |
          cd Viewers
          
          # Inject configuration assets
          wget -O ./firebase.json "${{ vars.OHIF_FIREBASE_JSON_URL }}"
          wget -O ./platform/app/public/config/test.js "${{ vars.OHIF_CONFIG_JS_URL }}"
          
          # 1. Link the external GCP components so they write to pluginConfig.json
          yarn cli link-mode ../ohif-gcp-mode
          yarn cli link-extension ../ohif-gcp-extension
          
          # 2. Run standard yarn installation from root so the monorepo registers links cleanly
          yarn install

          # 3. Compile client-side production build
          PUBLIC_URL=/ APP_CONFIG=config/test.js yarn --cwd platform/app run build:viewer

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          expires: 5d
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          entryPoint: ./Viewers
          channelId: live